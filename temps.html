<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> temps </title>

<link rel="stylesheet" href="temps.css">
<link rel="icon" type="image/x-icon" href="Images/Logo/temps_alt_alt.png">
</head>

<body>

<div class="landing">
    <div class="copyright-text" id="copyright-text"></div>
    <div class="landing-logo"></div>
    <div class="landing-popup">Click anywhere to begin!</div>
</div>

<div class="split-container">
    <button id="unit-button" data-unit="C"></button>

    <div class="split-side split-right"></div>
    <div class="split-side split-left"></div>

    <div class="copyright-right">
        <div class="image-copyright" id="copyright-right">Image: <a href="" target="_blank"></a></div>
        <div class="image-copyright" id="accreditation-right"><i>provided by Pexels</i></div>
    </div>

    <div class="copyright-left">
        <div class="image-copyright" id="copyright-left">Image: <a href="" target="_blank"></a></div>
        <div class="image-copyright" id="accreditation-left"></div>
    </div>

    <div class="center-piece">
        <div class="strip-base"></div>
        <div class="circle-base"></div>
        <div class="strip-fill"></div>
        <div class="circle-fill"></div>
        <div class="vs-text">vs</div>
    </div>

    <div class="left-half">
        <h2 id="left-city"></h2>
        <h3>current temperature is</h3>
        <h1 id="left-temp"></h1>
        <div class="time-block">
            <div class="local-time">LOCAL TIME:</div>
            <h2 id="local-time-left"></h2>
        </div>
    </div>

    <div class="right-half">
        <h2 id="right-city"></h2>
        <h3>current temperature is</h3>
        <button id="higher-button">
            HIGHER
            <img src="Images/SVGs/up.svg" class="btn-icon">
        </button><br>
        <button id="lower-button">
            LOWER
            <img src="Images/SVGs/down.svg" class="btn-icon">
        </button>
        <h3 id="left-city-2"></h3>
        <div class="time-block">
            <div class="local-time">LOCAL TIME:</div>
            <h2 id="local-time-right"></h2>
        </div>
    </div>
</div>

<div class="game-over"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="config.js"></script>
<script src="temps.js"></script>
</body>

</html>
